name: build and push BrineyLab Docker images

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            use_cache:
                description: Use Docker layer cache
                type: boolean
                default: true
            push:
                description: Push image to Docker Hub
                type: boolean
                default: true

concurrency:
    group: docker-publish
    cancel-in-progress: true

permissions:
    contents: read

env:
    DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
    # datascience
    datascience:
        runs-on: ubuntu-latest-brineylab-xlarge
        steps:
            - name: checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1
            - name: build and push
              uses: ./.github/actions/docker_build_push
              with:
                image_name: datascience
                dockerfile: ./datascience/Dockerfile
                tag_name: ${{ github.event.release.tag_name }}
                use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
                push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}

    # deeplearning
    deeplearning:
        runs-on: ubuntu-latest-brineylab-xlarge
        steps:
            - name: checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1
            - name: build and push
              uses: ./.github/actions/docker_build_push
              with:
                image_name: deeplearning
                dockerfile: ./deeplearning/Dockerfile
                tag_name: ${{ github.event.release.tag_name }}
                use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
                push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}

    # jupyterhub-datascience depends on datascience (adds JupyterLab/Hub)
    jupyterhub-datascience:
        runs-on: ubuntu-latest
        needs: [datascience]
        steps:
            - name: checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1
            - name: build and push
              uses: ./.github/actions/docker_build_push
              with:
                image_name: jupyterhub-datascience
                dockerfile: ./jupyterhub/datascience/Dockerfile
                tag_name: ${{ github.event.release.tag_name }}
                use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
                push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}

    # jupyterhub-deeplearning depends on deeplearning (adds JupyterLab/Hub)
    jupyterhub-deeplearning:
        runs-on: ubuntu-latest
        needs: [deeplearning]
        steps:
            - name: checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1
            - name: build and push
              uses: ./.github/actions/docker_build_push
              with:
                image_name: jupyterhub-deeplearning
                dockerfile: ./jupyterhub/deeplearning/Dockerfile
                tag_name: ${{ github.event.release.tag_name }}
                use_cache: ${{ github.event_name != 'workflow_dispatch' || inputs.use_cache }}
                push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}

    # test all images after build
    test:
        runs-on: ubuntu-latest-brineylab-xlarge
        needs: [jupyterhub-datascience, jupyterhub-deeplearning]
        steps:
            - name: checkout
              uses: actions/checkout@v6
              with:
                fetch-depth: 1
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ env.DOCKERHUB_USERNAME }}
                password: ${{ env.DOCKERHUB_TOKEN }}
            - name: set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - name: install pytest
              run: pip install pytest
            - name: determine tag
              id: tag
              run: |
                if [ -n "${{ github.event.release.tag_name }}" ]; then
                  echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
                else
                  echo "tag=latest" >> $GITHUB_OUTPUT
                fi
            - name: pull images
              run: |
                docker pull brineylab/datascience:${{ steps.tag.outputs.tag }}
                docker pull brineylab/deeplearning:${{ steps.tag.outputs.tag }}
                docker pull brineylab/jupyterhub-datascience:${{ steps.tag.outputs.tag }}
                docker pull brineylab/jupyterhub-deeplearning:${{ steps.tag.outputs.tag }}
            - name: run tests
              run: pytest tests/ -v --tag=${{ steps.tag.outputs.tag }}
