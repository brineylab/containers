name: build and push BrineyLab Docker images

on:
    release:
        types: [published]
    workflow_dispatch:

jobs:
    # base image
    base:
        runs-on: [self-hosted, legolas]

        permissions:
            contents: read
            packages: write

        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./base/Dockerfile
                cache-to: type=registry,ref=brineylab/${{ github.job }}:cache,mode=max
                cache-from: type=registry,ref=brineylab/${{ github.job }}:cache
                push: true
                tags: |
                    brineylab/${{ github.job }}:latest
                    ${{ github.event_name == 'release' && format('brineylab/{0}:{1}', github.job, github.event.release.tag_name) || '' }}

    # datascience depends on base (adds NGS tools)
    datascience:
        runs-on: [self-hosted, legolas]
        needs: [base]

        permissions:
            contents: read
            packages: write

        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./datascience/Dockerfile
                cache-to: type=registry,ref=brineylab/${{ github.job }}:cache,mode=max
                cache-from: type=registry,ref=brineylab/${{ github.job }}:cache
                push: true
                tags: |
                    brineylab/${{ github.job }}:latest
                    ${{ github.event_name == 'release' && format('brineylab/{0}:{1}', github.job, github.event.release.tag_name) || '' }}

    # deeplearning depends on base (adds CUDA + AI/ML)
    deeplearning:
        runs-on: [self-hosted, legolas]
        needs: [base]

        permissions:
            contents: read
            packages: write

        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./deeplearning/Dockerfile
                cache-to: type=registry,ref=brineylab/${{ github.job }}:cache,mode=max
                cache-from: type=registry,ref=brineylab/${{ github.job }}:cache
                push: true
                tags: |
                    brineylab/${{ github.job }}:latest
                    ${{ github.event_name == 'release' && format('brineylab/{0}:{1}', github.job, github.event.release.tag_name) || '' }}

    # jupyterhub-datascience depends on datascience (adds JupyterLab/Hub)
    jupyterhub-datascience:
        runs-on: [self-hosted, legolas]
        needs: [datascience]

        permissions:
            contents: read
            packages: write

        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./jupyterhub/datascience/Dockerfile
                cache-to: type=registry,ref=brineylab/${{ github.job }}:cache,mode=max
                cache-from: type=registry,ref=brineylab/${{ github.job }}:cache
                push: true
                tags: |
                    brineylab/${{ github.job }}:latest
                    ${{ github.event_name == 'release' && format('brineylab/{0}:{1}', github.job, github.event.release.tag_name) || '' }}

    # jupyterhub-deeplearning depends on deeplearning (adds JupyterLab/Hub)
    jupyterhub-deeplearning:
        runs-on: [self-hosted, legolas]
        needs: [deeplearning]

        permissions:
            contents: read
            packages: write

        steps:
            - name: checkout
              uses: actions/checkout@v6
            - name: set up QEMU
              uses: docker/setup-qemu-action@v4
            - name: set up docker buildx
              uses: docker/setup-buildx-action@v4
            - name: login to Docker Hub
              uses: docker/login-action@v4
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: build and push
              uses: docker/build-push-action@v6
              with:
                context: .
                file: ./jupyterhub/deeplearning/Dockerfile
                cache-to: type=registry,ref=brineylab/${{ github.job }}:cache,mode=max
                cache-from: type=registry,ref=brineylab/${{ github.job }}:cache
                push: true
                tags: |
                    brineylab/${{ github.job }}:latest
                    ${{ github.event_name == 'release' && format('brineylab/{0}:{1}', github.job, github.event.release.tag_name) || '' }}
